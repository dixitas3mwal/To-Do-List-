<!DOCTYPE html>
<html>
<head>
<title>To Do List</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#121212;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:400px;
    background:#1e1e1e;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.input-area{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    outline:none;
    background:#2b2b2b;
    color:white;
}

.add-btn{
    background:#7c3aed;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.add-btn:hover{
    background:#9333ea;
}

ol{
    margin-top:20px;
}

li{
    background:#2b2b2b;
    margin:10px 0;
    padding:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.remove-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
}

.remove-btn:hover{
    background:#dc2626;
}
</style>
</head>

<body>

<div class="container">

    <h1>✨ To Do List</h1>

    <div class="input-area">
        <input id="task" placeholder="Enter a task...">
        <button class="add-btn" onclick="add()">Add</button>
    </div>

    <ol id="list"></ol>

</div>

<script>
function add() {

    let item = document.getElementById("task").value;

    if(item.trim() !== ""){

        document.getElementById("list").innerHTML +=
        `<li>
            ${item}
            <button class="remove-btn"
            onclick="this.parentElement.remove()">
            Remove
            </button>
        </li>`;

        document.getElementById("task").value = "";
    }
}
</script>

</body>
</html>
